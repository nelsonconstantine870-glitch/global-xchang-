<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global XChange</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <nav class="tab-navigation">
            <a href="index.html" class="nav-tab active"><i class="fa-solid fa-right-left"></i> Exchange</a>
            <a href="Practice101.html" class="nav-tab"><i class="fas fa-calculator"></i> Calculator</a>
            <a href="Crypto.html" class="nav-tab"><i class="fa-solid fa-coins"></i> Crypto</a>
        </nav>

        <header>
            <h1><i class="fa-solid fa-globe text-gradient"></i> Global XChange</h1>
            <p>Official vs. Parallel Rates</p>
        </header>

        <div class="rate-cards">
            <div class="card parallel">
                <h3>Parallel Market Value</h3>
                <p id="parallel-badge">Loading...</p>
            </div>
            <div class="card official">
                <h3>Official Market Value</h3>
                <p id="official-badge">Loading...</p>
            </div>
        </div>

        <main class="converter-box">
            <div class="input-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" value="100">
            </div>

            <div class="conversion-row">
                <div class="select-box">
                    <label>From</label>
                    <div id="from-selector" class="custom-select-trigger">
                        <span id="from-display">USD - US Dollar</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>

                <button id="swap-btn" class="swap-btn">
                    <i class="fa-solid fa-right-left"></i>
                </button>

                <div class="select-box">
                    <label>To</label>
                    <div id="to-selector" class="custom-select-trigger">
                        <span id="to-display">NGN - Nigerian Naira</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div class="market-toggle">
                <span class="toggle-label">Rate Engine:</span>
                <div class="radio-inputs">
                    <label class="radio-option">
                        <input type="radio" name="market-type" value="parallel" checked>
                        <span class="name">Parallel Rate</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="market-type" value="official">
                        <span class="name">Official Rate</span>
                    </label>
                </div>
            </div>

            <div class="result-area">
                <p id="result-text">Enter value...</p>
                <small id="rate-timestamp"></small>
            </div>
        </main>
    </div>

    <div id="notification-container"></div>

    <div id="search-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Select Currency</h3>
                <button id="close-modal-btn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="currency-search-input" placeholder="Search country or code...">
            </div>
            <div id="modal-options-list" class="options-list"></div>
        </div>
    </div>

    <script src="Mel.js"></script>
</body>
</html>
