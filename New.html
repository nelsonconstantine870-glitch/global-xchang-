<!DOCTYPE html>
<html lang="en">
<head><link rel="stylesheet" href="Style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global XChange Calculator</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="calculator-container">
        <!-- Top Mode Indicator (matching your original app tabs) -->
        <div class="tab-container">
            <button class="tab-btn active"><i class="fas fa-calculator"></i> Calc Mode</button>
            <a href="index.html" style="text-decoration: none; flex: 1;">
    <button class="tab-btn"><i class="fas fa-exchange-alt"></i> Back to Rates</button>
</a>

        </div>

        <!-- Calculator Display Screen -->
        <div class="calc-screen">
            <div id="calc-history" class="screen-history"></div>
            <div id="calc-output" class="screen-output">0</div>
        </div>

        <!-- Calculator Keypad Grid -->
        <div class="calc-grid">
            <!-- Row 1 -->
            <button class="btn btn-action" onclick="clearScreen()">C</button>
            <button class="btn btn-action" onclick="appendOperator('/')">&divide;</button>
            <button class="btn btn-action" onclick="appendOperator('*')">&times;</button>
            <button class="btn btn-action" onclick="deleteLast()"><i class="fas fa-backspace"></i></button>

            <!-- Row 2 -->
            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">&minus;</button>

            <!-- Row 3 -->
            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <!-- Row 4 -->
            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            
            <!-- Equals button spans 2 rows down, featuring your purple app gradient -->
            <button class="btn btn-equals" onclick="calculateResult()">=</button>

            <!-- Row 5 -->
            <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
        </div>

        <div class="engine-footer">
            Global XChange Financial Engine
        </div>
    </div>

    <script src="Calculator.js"></script>
</body>
</html>
