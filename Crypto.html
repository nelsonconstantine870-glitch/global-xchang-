<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Engine</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <nav class="tab-navigation">
            <a href="index.html" class="nav-tab"><i class="fa-solid fa-right-left"></i> Exchange</a>
            <a href="Practice101.html" class="nav-tab"><i class="fas fa-calculator"></i> Calculator</a>
            <a href="Crypto.html" class="nav-tab active"><i class="fa-solid fa-coins"></i> Crypto</a>
        </nav>

        <header>
            <h1><i class="fa-solid fa-bolt text-gradient"></i> Crypto Hub</h1>
            <p>Cross-Asset Digital Platform Core</p>
        </header>

        <main class="converter-box">
            <div class="input-group">
                <label for="amount">Volume / Amount</label>
                <input type="number" id="amount" value="1" step="any">
            </div>

            <!-- Ad script placeholder -->
            <script>
              atOptions = {
                'key' : '3b7b6fb1a264bc4aec8242be484304dd',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
              };
            </script>
            <script src="https://www.highperformanceformat.com/3b7b6fb1a264bc4aec8242be484304dd/invoke.js"></script>

            <div class="conversion-row" style="position: relative;">
                <div class="select-box" style="position: relative;">
                    <label>From Source</label>
                    <div class="custom-select-trigger" id="fromSelected">BTC - Bitcoin</div>
                    
                    <div id="fromDropdown" class="dropdown-menu hidden" style="position: absolute; top: 100%; left: 0; width: 100%; background: #0f172a; border: 1px solid var(--border-color); border-radius: 14px; padding: 10px; z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin-top: 5px;">
                        <input type="text" class="search-input" placeholder="Search code..." style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 0.9rem;">
                        <div class="options-list" style="max-height: 160px; overflow-y: auto;"></div>
                    </div>
                </div>
                
                <button id="swapBtn" class="swap-btn">⇄</button>
                
                <div class="select-box" style="position: relative;">
                    <label>To Target</label>
                    <div class="custom-select-trigger" id="toSelected">USD - US Dollar (United States)</div>
                    
                    <div id="toDropdown" class="dropdown-menu hidden" style="position: absolute; top: 100%; left: 0; width: 100%; background: #0f172a; border: 1px solid var(--border-color); border-radius: 14px; padding: 10px; z-index: 1000; box-shadow: 0 15px 30px rgba(0,0,0,0.5); margin-top: 5px;">
                        <input type="text" class="search-input" placeholder="Search code..." style="width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 0.9rem;">
                        <div class="options-list" style="max-height: 160px; overflow-y: auto;"></div>
                    </div>
                </div>
            </div>

            <div class="result-area" style="margin-bottom: 25px;">
                <span class="toggle-label" style="display:block; margin-bottom: 5px; font-size: 0.75rem;">Calculated Valuation Result</span>
                <div id="result" style="font-size: 1.35rem; font-weight: 700; color: var(--official-color); word-break: break-all;">0.00</div>
            </div>
        </main>
    </div>

    <style>
        .dropdown-menu.hidden { display: none !important; }
        .option-item {
            padding: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            font-size: 0.88rem;
        }
        .option-item:hover { background: rgba(255,255,255,0.04); }
        .option-item strong { color: var(--accent-glow); }
        #setAlertBtn:hover { opacity: 0.9; }
    </style>
    <script src="Money.js"></script>
</body>
</html>
